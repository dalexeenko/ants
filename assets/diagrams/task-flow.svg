<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="640" viewBox="0 0 1400 640"
     xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.07"/>
    </filter>
    <!-- Solid arrowhead (right) -->
    <marker id="arr" viewBox="0 0 12 10" refX="10" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 1.5 L10 5 L0 8.5Z" fill="var(--arrow)"/>
    </marker>
    <!-- Dashed / return arrowhead (left) -->
    <marker id="arr-ret" viewBox="0 0 12 10" refX="10" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 1.5 L10 5 L0 8.5Z" fill="var(--arrow)" opacity="0.55"/>
    </marker>
    <style>
      :root {
        --bg-card: #ffffff;
        --bg-group: #EEF0F5;
        --border-card: #CBD5E1;
        --border-divider: #E2E8F0;
        --text-primary: #1E293B;
        --text-secondary: #64748B;
        --text-caption: #94A3B8;
        --arrow: #94A3B8;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-card: #1C2128;
          --bg-group: #161B22;
          --border-card: #30363D;
          --border-divider: #30363D;
          --text-primary: #E6EDF3;
          --text-secondary: #8B949E;
          --text-caption: #6E7681;
          --arrow: #6E7681;
        }
      }
    </style>
  </defs>

  <!-- Title -->
  <text x="700" y="46" font-size="21" font-weight="700" fill="var(--text-primary)"
        text-anchor="middle" letter-spacing="-0.3px">Task Flow — From User Request to Result</text>
  <text x="700" y="70" font-size="13" fill="var(--text-secondary)" text-anchor="middle">
    User → Interface → Director → Worker Agent loop → Tools / LLM → back
  </text>

  <!-- ═══════════════════════════════════════
       PARTICIPANT HEADER CARDS  y=95  h=76
       x centers: User=100, Interface=310, Director=540, Worker=780, Tools=1020, LLM=1270
       card width=150, offset so center is on x
       ═══════════════════════════════════════ -->

  <!-- User -->
  <rect x="25" y="95" width="150" height="76" rx="12"
        fill="var(--bg-card)" stroke="var(--border-card)" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="100" y="130" font-size="14" font-weight="700" fill="var(--text-primary)" text-anchor="middle">User</text>
  <line x1="39" y1="140" x2="161" y2="140" stroke="var(--border-divider)" stroke-width="1"/>
  <text x="100" y="157" font-size="11" fill="var(--text-secondary)" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">human</text>

  <!-- Interface -->
  <rect x="235" y="95" width="150" height="76" rx="12"
        fill="var(--bg-card)" stroke="var(--border-card)" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="310" y="127" font-size="14" font-weight="700" fill="var(--text-primary)" text-anchor="middle">Interface</text>
  <line x1="249" y1="137" x2="371" y2="137" stroke="var(--border-divider)" stroke-width="1"/>
  <text x="310" y="151" font-size="11" fill="var(--text-secondary)" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">Desktop / API / CLI</text>
  <text x="310" y="164" font-size="11" fill="var(--text-secondary)" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace"> </text>

  <!-- Director -->
  <rect x="465" y="95" width="150" height="76" rx="12"
        fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="540" y="130" font-size="14" font-weight="700" fill="#3730A3" text-anchor="middle">Director</text>
  <line x1="479" y1="140" x2="601" y2="140" stroke="#C7D2FE" stroke-width="1"/>
  <text x="540" y="157" font-size="11" fill="#4338CA" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">orchestrator</text>

  <!-- Worker -->
  <rect x="705" y="95" width="150" height="76" rx="12"
        fill="#FDF2F8" stroke="#F9A8D4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="780" y="130" font-size="14" font-weight="700" fill="#9D174D" text-anchor="middle">Worker Agent</text>
  <line x1="719" y1="140" x2="841" y2="140" stroke="#F9A8D4" stroke-width="1"/>
  <text x="780" y="157" font-size="11" fill="#BE185D" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">isolated session</text>

  <!-- Tools -->
  <rect x="945" y="95" width="150" height="76" rx="12"
        fill="var(--bg-card)" stroke="var(--border-card)" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1020" y="130" font-size="14" font-weight="700" fill="var(--text-primary)" text-anchor="middle">Tools</text>
  <line x1="959" y1="140" x2="1081" y2="140" stroke="var(--border-divider)" stroke-width="1"/>
  <text x="1020" y="157" font-size="11" fill="var(--text-secondary)" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">bash · files · browser</text>

  <!-- LLM Provider -->
  <rect x="1195" y="95" width="150" height="76" rx="12"
        fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1270" y="130" font-size="14" font-weight="700" fill="#166534" text-anchor="middle">LLM Provider</text>
  <line x1="1209" y1="140" x2="1331" y2="140" stroke="#86EFAC" stroke-width="1"/>
  <text x="1270" y="157" font-size="11" fill="#15803D" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">Claude / GPT / etc.</text>

  <!-- ═══════════════════════════════════════
       LIFELINES  (vertical dashed lines)
       from y=171 downward
       ═══════════════════════════════════════ -->
  <line x1="100" y1="171" x2="100" y2="580" stroke="var(--border-card)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="310" y1="171" x2="310" y2="580" stroke="var(--border-card)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="540" y1="171" x2="540" y2="580" stroke="var(--border-card)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="780" y1="171" x2="780" y2="580" stroke="var(--border-card)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="1020" y1="171" x2="1020" y2="580" stroke="var(--border-card)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="1270" y1="171" x2="1270" y2="580" stroke="var(--border-card)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ═══════════════════════════════════════
       SEQUENCE MESSAGES
       ═══════════════════════════════════════ -->

  <!-- 1. User → Interface: "Fix the login bug and open a PR" -->
  <line x1="103" y1="210" x2="307" y2="210"
        stroke="var(--arrow)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="205" y="205" font-size="11" fill="var(--text-secondary)" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">"Fix the login bug and open a PR"</text>

  <!-- 2. Interface → Director: task submitted -->
  <line x1="313" y1="238" x2="537" y2="238"
        stroke="var(--arrow)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="425" y="233" font-size="11" fill="var(--text-secondary)" text-anchor="middle">task submitted</text>

  <!-- 3. Director → Director: plan (self-call arc) -->
  <path d="M540 260 C600 260 600 284 540 284"
        stroke="var(--arrow)" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="610" y="274" font-size="11" fill="var(--text-secondary)">plan — break into subtasks</text>

  <!-- 4. Director → Worker: spawn -->
  <line x1="543" y1="306" x2="777" y2="306"
        stroke="var(--arrow)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="660" y="301" font-size="11" fill="var(--text-secondary)" text-anchor="middle">spawn worker(s) in isolated session(s)</text>

  <!-- ── Agent loop box ── -->
  <rect x="56" y="320" width="1308" height="152" rx="10"
        fill="none" stroke="var(--border-card)" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="72" y="315" font-size="10" fill="var(--text-caption)" font-weight="600" letter-spacing="0.08em">AGENT LOOP</text>

  <!-- 5. Worker → LLM: next action? -->
  <line x1="783" y1="342" x2="1267" y2="342"
        stroke="var(--arrow)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="1025" y="337" font-size="11" fill="var(--text-secondary)" text-anchor="middle">next action?</text>

  <!-- 6. LLM → Worker: call tool X (dashed return) -->
  <line x1="1267" y1="366" x2="783" y2="366"
        stroke="var(--arrow)" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arr-ret)"/>
  <text x="1025" y="361" font-size="11" fill="var(--text-secondary)" text-anchor="middle">call tool X</text>

  <!-- 7. Worker → Tools: execute -->
  <line x1="783" y1="392" x2="1017" y2="392"
        stroke="var(--arrow)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="900" y="387" font-size="11" fill="var(--text-secondary)" text-anchor="middle">execute</text>

  <!-- 8. Tools → Worker: result (dashed return) -->
  <line x1="1017" y1="416" x2="783" y2="416"
        stroke="var(--arrow)" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arr-ret)"/>
  <text x="900" y="411" font-size="11" fill="var(--text-secondary)" text-anchor="middle">result</text>

  <!-- 9. Worker → Tools: run tests, open PR  (below loop box) -->
  <line x1="783" y1="490" x2="1017" y2="490"
        stroke="var(--arrow)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="900" y="485" font-size="11" fill="var(--text-secondary)" text-anchor="middle">run tests · open PR</text>

  <!-- 10. Worker → Director: done — PR #123 (dashed return) -->
  <line x1="777" y1="514" x2="543" y2="514"
        stroke="var(--arrow)" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arr-ret)"/>
  <text x="660" y="509" font-size="11" fill="var(--text-secondary)" text-anchor="middle">done — PR #123</text>

  <!-- 11. Director → Interface: result + summary (dashed return) -->
  <line x1="537" y1="538" x2="313" y2="538"
        stroke="var(--arrow)" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arr-ret)"/>
  <text x="425" y="533" font-size="11" fill="var(--text-secondary)" text-anchor="middle">result + summary</text>

  <!-- 12. Interface → User: PR opened (dashed return) -->
  <line x1="307" y1="562" x2="103" y2="562"
        stroke="var(--arrow)" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arr-ret)"/>
  <text x="205" y="557" font-size="11" fill="#38A868" text-anchor="middle" font-weight="600">PR opened</text>

  <!-- Legend -->
  <line x1="56" y1="600" x2="86" y2="600"
        stroke="var(--arrow)" stroke-width="1.5"/>
  <text x="94" y="604" font-size="11" fill="var(--text-secondary)">call / forward</text>
  <line x1="200" y1="600" x2="230" y2="600"
        stroke="var(--arrow)" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="238" y="604" font-size="11" fill="var(--text-secondary)">return / response</text>
</svg>
