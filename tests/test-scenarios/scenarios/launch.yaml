name: App Launch
description: Verify the app launches and shows its initial state
preconditions: []
steps:
  - assertVisible:
      testId: ants-app
  # Desktop: icon rail visible
  - assertVisible:
      testId: ants-icon-rail
      desktop: true
  # Desktop: welcome screen (no project selected)
  - assertVisible:
      testId: ants-welcome-screen
      desktop: true
  # Mobile: home screen visible
  - assertVisible:
      testId: ants-home-screen
      mobile: true
  # Mobile: drawer toggle visible
  - assertVisible:
      testId: ants-drawer-toggle
      mobile: true
