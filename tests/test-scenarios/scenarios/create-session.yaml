name: Create a new session
description: Create a new chat session within an existing project
preconditions:
  - projectExists: true
steps:
  - tap:
      testId: ants-project-new-session
  - assertVisible:
      testId: ants-chat-input
  # Desktop: chat view visible
  - assertVisible:
      testId: ants-chat-view
      desktop: true
  # Mobile: session screen visible
  - assertVisible:
      testId: ants-session-screen
      mobile: true
