name: Navigate to Agents
description: Navigate to the agents screen from the initial state
preconditions: []
steps:
  # Desktop: click icon rail agents button
  - tap:
      testId: ants-icon-rail-agents
      desktop: true
  - assertVisible:
      testId: ants-agents-panel
      desktop: true

  # Mobile: open drawer, tap agents
  - tap:
      testId: ants-drawer-toggle
      mobile: true
  - tap:
      testId: ants-drawer-agents
      mobile: true
  - assertVisible:
      testId: ants-screen-agents
      mobile: true
