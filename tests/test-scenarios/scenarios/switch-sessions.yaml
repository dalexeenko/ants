name: Switch between sessions
description: Create two sessions and switch between them
preconditions:
  - projectExists: true
steps:
  # Create first session
  - tap:
      testId: ants-project-new-session
  - assertVisible:
      testId: ants-chat-input

  # Type a message in the first session to identify it
  - tap:
      testId: ants-chat-input-field
  - type:
      testId: ants-chat-input-field
      text: "First session message"
  - tap:
      testId: ants-chat-send
  - waitForVisible:
      text: "First session message"

  # Create second session
  - tap:
      testId: ants-project-new-session
  - assertVisible:
      testId: ants-chat-input
