name: Navigate to Director
description: Navigate to the director screen from the initial state
preconditions: []
steps:
  # Desktop: click the director icon in the icon rail
  - tap:
      desktop: true
      testId: ants-icon-rail-director
  - assertVisible:
      desktop: true
      testId: director-sidebar

  # Mobile: open drawer and tap Director
  - tap:
      mobile: true
      testId: ants-drawer-toggle
  - tap:
      mobile: true
      testId: ants-drawer-director
  - assertVisible:
      mobile: true
      testId: ants-screen-director
