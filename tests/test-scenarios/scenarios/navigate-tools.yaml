name: Navigate to Tools
description: Navigate to the tools screen via the drawer (mobile only)
preconditions: []
steps:
  # Mobile only: open drawer and tap Tools
  - tap:
      mobile: true
      testId: ants-drawer-toggle
  - tap:
      mobile: true
      testId: ants-drawer-tools
  - assertVisible:
      mobile: true
      testId: ants-screen-tools
