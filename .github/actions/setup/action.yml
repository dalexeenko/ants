name: Setup
description: Install pnpm, Node.js, dependencies, and build all packages

inputs:
  node-version:
    description: Node.js version
    required: false
    default: "20"
  build:
    description: Whether to run turbo build
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash
    - if: inputs.build == 'true'
      run: pnpm turbo build --force
      shell: bash
