name: E2E Server UI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-server-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: tests/server-ui-e2e

      - name: Run server UI E2E tests
        run: pnpm --filter @ants/server-ui-e2e test:e2e

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-ui-e2e-results
          path: |
            tests/server-ui-e2e/test-results/
            tests/server-ui-e2e/playwright-report/
          retention-days: 7
