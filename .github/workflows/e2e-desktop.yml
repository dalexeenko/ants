name: E2E Desktop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-desktop:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Rebuild native modules for Electron
        run: pnpm --filter @openmgr/app-electron exec electron-rebuild -f -w better-sqlite3,keytar,node-pty

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/desktop

      - name: Verify generated E2E tests are up-to-date
        run: pnpm --filter @openmgr/test-scenarios generate:check

      - name: Run Playwright E2E tests
        run: pnpm --filter @openmgr/app-electron test:e2e

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-e2e-results
          path: |
            apps/desktop/test-results/
            apps/desktop/playwright-report/
          retention-days: 7
