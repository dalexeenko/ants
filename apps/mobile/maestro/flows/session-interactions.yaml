# Verify chat interactions in a session
appId: host.exp.Exponent
---
- launchApp
- tapOn:
    id: "ants-project-new-session"
- assertVisible:
    id: "ants-session-screen"
- assertVisible:
    id: "ants-chat-input"
- assertVisible:
    id: "ants-chat-send"
- tapOn:
    id: "ants-chat-input-field"
- inputText: "Test interaction message"
- assertVisible:
    text: "Test interaction message"
# Verify cancel/clear behavior
- tapOn:
    id: "ants-chat-input-field"
- clearText
- assertNotVisible:
    text: "Test interaction message"
