# Send a message in a session.
#
# Preconditions:
#   - User is authenticated (at least one provider)
#   - At least one project exists
#   - This flow creates a new session and sends a message in it
appId: host.exp.Exponent
---
- launchApp
- assertVisible:
    id: "ants-home-screen"

# Create a new session
- tapOn:
    id: "ants-project-new-session"
- assertVisible:
    id: "ants-chat-input"

# Type a message
- tapOn:
    id: "ants-chat-input-field"
- inputText: "Hello from Maestro E2E test"

# Send the message
- tapOn:
    id: "ants-chat-send"

# The message should appear in the chat (as text content)
- assertVisible:
    text: "Hello from Maestro E2E test"
