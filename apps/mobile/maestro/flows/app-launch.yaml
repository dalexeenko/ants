# Verify the app launches and shows the home screen.
appId: host.exp.Exponent
---
- launchApp
- assertVisible:
    id: "ants-app"
- assertVisible:
    id: "ants-screen-home"
- assertVisible:
    id: "ants-home-screen"
# The drawer toggle (hamburger menu) should be visible in the header
- assertVisible:
    id: "ants-drawer-toggle"
