# Navigate to Settings via the drawer menu.
appId: host.exp.Exponent
---
- launchApp
- assertVisible:
    id: "ants-home-screen"

# Open the drawer
- tapOn:
    id: "ants-drawer-toggle"
- assertVisible:
    id: "ants-drawer"

# Tap Settings in the drawer
- tapOn:
    id: "ants-drawer-settings"

# Verify we're on the settings screen
- assertVisible:
    id: "ants-screen-settings"
- assertVisible:
    id: "ants-settings-screen"
