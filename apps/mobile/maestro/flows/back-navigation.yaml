# Navigate into a session, then go back to home
appId: host.exp.Exponent
---
- launchApp
- assertVisible:
    id: "ants-home-screen"
# Navigate to a different screen first
- tapOn:
    id: "ants-drawer-toggle"
- tapOn:
    id: "ants-drawer-settings"
- assertVisible:
    id: "ants-settings-screen"
# Navigate back to home via drawer
- tapOn:
    id: "ants-drawer-toggle"
- tapOn:
    id: "ants-drawer-home"
- assertVisible:
    id: "ants-home-screen"
