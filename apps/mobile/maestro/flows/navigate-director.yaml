# Open drawer, tap Director, assert director screen
appId: host.exp.Exponent
---
- launchApp
- tapOn:
    id: "ants-drawer-toggle"
- assertVisible:
    id: "ants-drawer"
- tapOn:
    id: "ants-drawer-director"
- assertVisible:
    id: "ants-screen-director"
- assertVisible:
    id: "ants-director-screen"
