# Navigate through all drawer screens sequentially
appId: host.exp.Exponent
---
- launchApp
- assertVisible:
    id: "ants-home-screen"

# Navigate to Director
- tapOn:
    id: "ants-drawer-toggle"
- tapOn:
    id: "ants-drawer-director"
- assertVisible:
    id: "ants-screen-director"

# Navigate to Agents
- tapOn:
    id: "ants-drawer-toggle"
- tapOn:
    id: "ants-drawer-agents"
- assertVisible:
    id: "ants-screen-agents"

# Navigate to Tools
- tapOn:
    id: "ants-drawer-toggle"
- tapOn:
    id: "ants-drawer-tools"
- assertVisible:
    id: "ants-screen-tools"

# Navigate to Settings
- tapOn:
    id: "ants-drawer-toggle"
- tapOn:
    id: "ants-drawer-settings"
- assertVisible:
    id: "ants-screen-settings"

# Navigate back to Home
- tapOn:
    id: "ants-drawer-toggle"
- tapOn:
    id: "ants-drawer-home"
- assertVisible:
    id: "ants-home-screen"
