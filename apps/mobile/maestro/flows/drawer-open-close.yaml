# Open the drawer and close it with the X button.
appId: host.exp.Exponent
---
- launchApp
- assertVisible:
    id: "ants-home-screen"

# Open the drawer
- tapOn:
    id: "ants-drawer-toggle"
- assertVisible:
    id: "ants-drawer"

# Close the drawer via X button
- tapOn:
    id: "ants-drawer-close"

# Verify we're back on the home screen (drawer dismissed)
- assertVisible:
    id: "ants-home-screen"
