# Navigate away from Home, then back to Home via the drawer.
appId: host.exp.Exponent
---
- launchApp
- assertVisible:
    id: "ants-home-screen"

# Navigate to Settings first
- tapOn:
    id: "ants-drawer-toggle"
- tapOn:
    id: "ants-drawer-settings"
- assertVisible:
    id: "ants-settings-screen"

# Now navigate back to Home via drawer
- tapOn:
    id: "ants-drawer-toggle"
- tapOn:
    id: "ants-drawer-home"

# Verify we're back on home
- assertVisible:
    id: "ants-screen-home"
- assertVisible:
    id: "ants-home-screen"
