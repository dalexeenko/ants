# Navigate to Agents via the drawer menu.
appId: host.exp.Exponent
---
- launchApp
- assertVisible:
    id: "openmgr-home-screen"

# Open the drawer
- tapOn:
    id: "openmgr-drawer-toggle"
- assertVisible:
    id: "openmgr-drawer"

# Tap Agents in the drawer
- tapOn:
    id: "openmgr-drawer-agents"

# Verify we're on the agents screen
- assertVisible:
    id: "openmgr-screen-agents"
