# Docker Compose for ants-server local development
#
# Uses the production Dockerfile so the image is identical to what ships.
# Run from the monorepo root:
#   pnpm compose:up          # build + start (foreground)
#   pnpm compose:up:detached # build + start (background)
#   pnpm compose:logs        # tail logs
#   pnpm compose:down        # stop + remove
#
# The server will be available at http://localhost:6647

services:
  ants-server:
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
      args:
        IMAGE_TAG: ants/server:local
        ANTS_SERVER_VERSION: ${ANTS_SERVER_VERSION:-dev}
    ports:
      - "6647:6647"
    volumes:
      # Persistent data directory
      - ants-data:/data
      # Workspaces for agents
      - ants-workspaces:/workspaces
    environment:
      - ANTS_HOST=0.0.0.0
      - ANTS_PORT=6647
      - ANTS_DATA_DIR=/data
      - ANTS_WORKSPACES_DIR=/workspaces
      # Multi-user mode — incompatible with ANTS_SECRET
      - ANTS_MULTI_USER=true
      # Token required to create the first admin account (POST /api/users/setup)
      # DO NOT use this value in production
      - ANTS_SETUP_TOKEN=dev-setup-token-do-not-use-in-production
      # Encryption key for API keys (32-byte base64 - DO NOT use in production)
      - ANTS_ENCRYPTION_KEY=ruuwZl5FbgAGSobitm4RCMSu4dVrDz+VVNpQDP6XXTs=
    restart: unless-stopped

volumes:
  ants-data:
  ants-workspaces:
