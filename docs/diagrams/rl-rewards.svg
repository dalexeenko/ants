<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="380" viewBox="0 0 1200 380"
     xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.07"/>
    </filter>
    <marker id="arr" viewBox="0 0 12 10" refX="10" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 1.5 L10 5 L0 8.5Z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="46" font-size="21" font-weight="700" fill="#1E293B"
        text-anchor="middle" letter-spacing="-0.3px">RL with Verifiable Rewards — Episode Flow</text>
  <text x="600" y="70" font-size="13" fill="#64748B" text-anchor="middle">
    Each task run: setup broken state → agent acts → verifiers score → scalar reward
  </text>

  <!-- ═══════════════════════════════════════
       EPISODE outer container  x=30, y=88, w=1140, h=220
       ═══════════════════════════════════════ -->
  <rect x="30" y="88" width="1140" height="228" rx="16" fill="#EEF0F5"/>
  <text x="46" y="85" font-size="10" fill="#94A3B8" font-weight="600" letter-spacing="0.08em">EPISODE (ONE TASK RUN)</text>

  <!-- ── TASK SETUP card  x=60, center-y=202 ── -->
  <rect x="60" y="120" width="220" height="160" rx="12"
        fill="white" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="160" font-size="15" font-weight="700" fill="#1E293B" text-anchor="middle">Task Setup</text>
  <line x1="74" y1="170" x2="266" y2="170" stroke="#E2E8F0" stroke-width="1"/>
  <text x="170" y="192" font-size="12" fill="#64748B" text-anchor="middle">isolated temp</text>
  <text x="170" y="208" font-size="12" fill="#64748B" text-anchor="middle">workspace</text>
  <text x="170" y="232" font-size="11" fill="#94A3B8" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">initial broken state</text>
  <text x="170" y="248" font-size="11" fill="#94A3B8" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">task.setup()</text>

  <!-- Arrow 1: Setup → Agent Runner -->
  <g>
    <line x1="282" y1="200" x2="358" y2="200"
          stroke="#94A3B8" stroke-width="1.8" marker-end="url(#arr)"/>
    <text x="320" y="192" font-size="10.5" fill="#64748B" text-anchor="middle">isolated temp</text>
    <text x="320" y="204" font-size="10.5" fill="#64748B" text-anchor="middle">workspace</text>
  </g>

  <!-- ── AGENT RUNNER card  x=360, center-y=202 ── -->
  <rect x="360" y="120" width="220" height="160" rx="12"
        fill="#FDF2F8" stroke="#F9A8D4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="470" y="158" font-size="15" font-weight="700" fill="#9D174D" text-anchor="middle">Agent Runner</text>
  <line x1="374" y1="168" x2="566" y2="168" stroke="#F9A8D4" stroke-width="1"/>
  <text x="470" y="192" font-size="12" fill="#BE185D" text-anchor="middle">LLM or stub</text>
  <text x="470" y="212" font-size="12" fill="#BE185D" text-anchor="middle">LLM-agnostic</text>
  <text x="470" y="242" font-size="11" fill="#F472B6" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">(prompt, path)</text>
  <text x="470" y="256" font-size="11" fill="#F472B6" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">⇒ Promise&lt;void&gt;</text>

  <!-- Arrow 2: Agent → Verifiers -->
  <g>
    <line x1="582" y1="200" x2="658" y2="200"
          stroke="#94A3B8" stroke-width="1.8" marker-end="url(#arr)"/>
    <text x="620" y="192" font-size="10.5" fill="#64748B" text-anchor="middle">modifies</text>
    <text x="620" y="204" font-size="10.5" fill="#64748B" text-anchor="middle">files</text>
  </g>

  <!-- ── VERIFIERS card  x=660, center-y=202 ── -->
  <rect x="660" y="120" width="220" height="160" rx="12"
        fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="770" y="158" font-size="15" font-weight="700" fill="#3730A3" text-anchor="middle">Verifiers</text>
  <line x1="674" y1="168" x2="866" y2="168" stroke="#C7D2FE" stroke-width="1"/>
  <text x="770" y="192" font-size="12" fill="#4338CA" text-anchor="middle">reward functions</text>
  <text x="770" y="215" font-size="11" fill="#818CF8" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">fileExists</text>
  <text x="770" y="230" font-size="11" fill="#818CF8" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">fileContains</text>
  <text x="770" y="245" font-size="11" fill="#818CF8" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">scriptOutputs</text>
  <text x="770" y="260" font-size="11" fill="#818CF8" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">typescriptCompiles</text>

  <!-- Arrow 3: Verifiers → Reward -->
  <line x1="882" y1="200" x2="958" y2="200"
        stroke="#94A3B8" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- ── REWARD SCORE card  x=960, center-y=202 ── -->
  <rect x="960" y="120" width="180" height="160" rx="12"
        fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1050" y="158" font-size="15" font-weight="700" fill="#166534" text-anchor="middle">Reward Score</text>
  <line x1="974" y1="168" x2="1126" y2="168" stroke="#86EFAC" stroke-width="1"/>
  <text x="1050" y="196" font-size="26" font-weight="700" fill="#166534" text-anchor="middle">0–1</text>
  <text x="1050" y="226" font-size="12" fill="#15803D" text-anchor="middle">scalar signal</text>
  <text x="1050" y="248" font-size="11" fill="#86EFAC" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">mean of verifiers</text>

  <!-- ═══════════════════════════════════════
       Partial credit examples  y=340
       ═══════════════════════════════════════ -->
  <rect x="30" y="330" width="1140" height="36" rx="8" fill="none"/>

  <!-- reward=0 pill -->
  <rect x="56" y="332" width="90" height="24" rx="6" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="101" y="348" font-size="11" font-weight="600" fill="#991B1B" text-anchor="middle">reward = 0</text>

  <text x="160" y="348" font-size="11" fill="#64748B">agent does nothing — both verifiers fail</text>

  <!-- reward=0.5 pill -->
  <rect x="440" y="332" width="104" height="24" rx="6" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1"/>
  <text x="492" y="348" font-size="11" font-weight="600" fill="#92400E" text-anchor="middle">reward = 0.5</text>

  <text x="558" y="348" font-size="11" fill="#64748B">fixes logic, wrong code path — partial credit</text>

  <!-- reward=1 pill -->
  <rect x="870" y="332" width="90" height="24" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="915" y="348" font-size="11" font-weight="600" fill="#166534" text-anchor="middle">reward = 1</text>

  <text x="974" y="348" font-size="11" fill="#64748B">all verifiers pass</text>
</svg>
