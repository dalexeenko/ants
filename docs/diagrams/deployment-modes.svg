<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="480" viewBox="0 0 1600 480"
     xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.07"/>
    </filter>
    <marker id="arr" viewBox="0 0 12 10" refX="10" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 1.5 L10 5 L0 8.5Z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="800" y="46" font-size="21" font-weight="700" fill="#1E293B"
        text-anchor="middle" letter-spacing="-0.3px">Deployment Modes</text>
  <text x="800" y="70" font-size="13" fill="#64748B" text-anchor="middle">
    Local single-user · Self-hosted team server · Persistent storage
  </text>

  <!-- ═══════════════════════════════════════
       LOCAL group  x=40, y=95, w=460, h=270
       ═══════════════════════════════════════ -->
  <rect x="40" y="95" width="460" height="270" rx="16" fill="#EEF0F5"/>
  <text x="56" y="92" font-size="10" fill="#94A3B8" font-weight="600" letter-spacing="0.08em">LOCAL (SINGLE USER)</text>

  <!-- Desktop App -->
  <rect x="60" y="115" width="180" height="84" rx="12"
        fill="white" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="150" font-size="14" font-weight="700" fill="#1E293B" text-anchor="middle">Desktop App</text>
  <line x1="74" y1="160" x2="226" y2="160" stroke="#E2E8F0" stroke-width="1"/>
  <text x="150" y="178" font-size="11.5" fill="#64748B" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">Electron</text>

  <!-- CLI (local) -->
  <rect x="60" y="225" width="180" height="84" rx="12"
        fill="white" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="260" font-size="14" font-weight="700" fill="#1E293B" text-anchor="middle">CLI</text>
  <line x1="74" y1="270" x2="226" y2="270" stroke="#E2E8F0" stroke-width="1"/>
  <text x="150" y="288" font-size="11.5" fill="#64748B" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">command line</text>

  <!-- Local Agent -->
  <rect x="300" y="170" width="180" height="84" rx="12"
        fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="390" y="205" font-size="14" font-weight="700" fill="#3730A3" text-anchor="middle">Local Agent</text>
  <line x1="314" y1="215" x2="466" y2="215" stroke="#C7D2FE" stroke-width="1"/>
  <text x="390" y="233" font-size="11.5" fill="#4338CA" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">Node.js process</text>

  <!-- Arrows: Desktop → Local Agent -->
  <line x1="242" y1="157" x2="298" y2="200"
        stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Arrow: CLI → Local Agent -->
  <line x1="242" y1="267" x2="298" y2="234"
        stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════
       SERVER group  x=560, y=95, w=620, h=270
       ═══════════════════════════════════════ -->
  <rect x="560" y="95" width="620" height="270" rx="16" fill="#EEF0F5"/>
  <text x="576" y="92" font-size="10" fill="#94A3B8" font-weight="600" letter-spacing="0.08em">SELF-HOSTED SERVER (TEAM)</text>

  <!-- Web UI -->
  <rect x="580" y="115" width="160" height="84" rx="12"
        fill="white" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="660" y="150" font-size="14" font-weight="700" fill="#1E293B" text-anchor="middle">Web UI</text>
  <line x1="594" y1="160" x2="726" y2="160" stroke="#E2E8F0" stroke-width="1"/>
  <text x="660" y="178" font-size="11.5" fill="#64748B" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">browser</text>

  <!-- Slack / webhook -->
  <rect x="580" y="225" width="160" height="84" rx="12"
        fill="white" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="660" y="257" font-size="14" font-weight="700" fill="#1E293B" text-anchor="middle">Slack</text>
  <line x1="594" y1="267" x2="726" y2="267" stroke="#E2E8F0" stroke-width="1"/>
  <text x="660" y="285" font-size="11.5" fill="#64748B" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">webhook · bot</text>

  <!-- Ants Server -->
  <rect x="800" y="150" width="180" height="84" rx="12"
        fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="890" y="185" font-size="14" font-weight="700" fill="#3730A3" text-anchor="middle">Ants Server</text>
  <line x1="814" y1="195" x2="966" y2="195" stroke="#C7D2FE" stroke-width="1"/>
  <text x="890" y="213" font-size="11.5" fill="#4338CA" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">Docker</text>

  <!-- Agent Pool -->
  <rect x="1030" y="150" width="130" height="84" rx="12"
        fill="#FDF2F8" stroke="#F9A8D4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1095" y="185" font-size="14" font-weight="700" fill="#9D174D" text-anchor="middle">Agent Pool</text>
  <line x1="1044" y1="195" x2="1146" y2="195" stroke="#F9A8D4" stroke-width="1"/>
  <text x="1095" y="213" font-size="11.5" fill="#BE185D" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">parallel workers</text>

  <!-- Arrows: Web UI → Server -->
  <line x1="742" y1="157" x2="798" y2="182"
        stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Slack → Server -->
  <line x1="742" y1="267" x2="798" y2="218"
        stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Server → Agent Pool -->
  <line x1="982" y1="192" x2="1028" y2="192"
        stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════
       STORAGE group  x=1250, y=95, w=310, h=270
       ═══════════════════════════════════════ -->
  <rect x="1250" y="95" width="310" height="270" rx="16" fill="#EEF0F5"/>
  <text x="1266" y="92" font-size="10" fill="#94A3B8" font-weight="600" letter-spacing="0.08em">PERSISTENT STORAGE</text>

  <!-- ants-data volume -->
  <rect x="1270" y="115" width="270" height="100" rx="12"
        fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1405" y="152" font-size="14" font-weight="700" fill="#166534" text-anchor="middle">ants-data</text>
  <line x1="1284" y1="162" x2="1526" y2="162" stroke="#86EFAC" stroke-width="1"/>
  <text x="1405" y="180" font-size="11.5" fill="#15803D" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">SQLite · settings</text>
  <text x="1405" y="196" font-size="10" fill="#15803D" text-anchor="middle"
        letter-spacing="0.06em">VOLUME</text>

  <!-- ants-workspaces volume -->
  <rect x="1270" y="235" width="270" height="100" rx="12"
        fill="white" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1405" y="272" font-size="14" font-weight="700" fill="#1E293B" text-anchor="middle">ants-workspaces</text>
  <line x1="1284" y1="282" x2="1526" y2="282" stroke="#E2E8F0" stroke-width="1"/>
  <text x="1405" y="300" font-size="11.5" fill="#64748B" text-anchor="middle"
        font-family="'SF Mono','Fira Code',ui-monospace,monospace">worktrees · artifacts</text>
  <text x="1405" y="316" font-size="10" fill="#94A3B8" text-anchor="middle"
        letter-spacing="0.06em">VOLUME</text>

  <!-- ── Cross-group arrows to Storage ── -->
  <!-- Local Agent → ants-data -->
  <line x1="482" y1="212" x2="1268" y2="165"
        stroke="#94A3B8" stroke-width="1.3" stroke-dasharray="6,3" marker-end="url(#arr)"/>

  <!-- Agent Pool → ants-data -->
  <line x1="1162" y1="185" x2="1268" y2="175"
        stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Agent Pool → ants-workspaces -->
  <line x1="1162" y1="205" x2="1268" y2="275"
        stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Footer -->
  <line x1="56" y1="424" x2="86" y2="424"
        stroke="#94A3B8" stroke-width="1.3" stroke-dasharray="6,3"/>
  <text x="94" y="428" font-size="11" fill="#64748B">Local agent also writes to ants-data</text>
  <line x1="320" y1="424" x2="350" y2="424"
        stroke="#94A3B8" stroke-width="1.5"/>
  <text x="358" y="428" font-size="11" fill="#64748B">Primary data / control flow</text>
</svg>
